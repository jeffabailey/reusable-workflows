name: Hugo Deploy

on:
  workflow_call:
    inputs:
      website_repository:
        required: false
        type: string
      s3_bucket_name:
        required: true
        type: string
      cloudfront_distribution_id:
        required: true
        type: string
    secrets:
      aws_access_key_id:
        required: true
      aws_secret_access_key:
        required: true
      access_token:
        required: true

jobs:
  deploywebsite:
    name: "Deploy Website"
    runs-on: ubuntu-latest

    # Hugo's own cache dir (for modules / remote resources)
    env:
      HUGO_CACHEDIR: /tmp/hugo_cache

    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.aws_access_key_id }}
          aws-secret-access-key: ${{ secrets.aws_secret_access_key }}
          aws-region: us-east-1

      - name: Checkout
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.website_repository || github.repository }}
          token: ${{ secrets.access_token }}
          fetch-depth: 1

      # Load env vars from .env (same as before)
      - name: Simple Dotenv
        uses: xom9ikk/dotenv@v1.0.2
        with:
          path: ./

      - name: Set Default Git Branch
        run: git config --global init.defaultBranch main

      # Setup Hugo (pin to the version you're actually using from the log)
      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2.6.0
        with:
          hugo-version: '0.157.0'
          extended: true

      - name: Get Hugo version
        id: hugo-version
        working-directory: ./hugo
        run: |
          HUGO_VERSION=$(hugo version | grep -oE 'v[0-9]+\.[0-9]+\.[0-9]+' | head -1 || echo "latest")
          echo "version=$HUGO_VERSION" >> "$GITHUB_OUTPUT"

      - name: Build
        working-directory: ./hugo
        timeout-minutes: 15
        run: hugo --minify --gc

      - name: List Built Files
        run: find ./hugo/public -type f | sort

      - name: Convert JSONC to JSON
        run: |
          if [ -d ./hugo/data ]; then
            find ./hugo/data -name '*.jsonc' -exec sh -c 'npx -y json5 -s 2 "$1" > "${1%.jsonc}.json"' _ {} \;
          fi

      - name: S3 Sync
        run: |
          aws s3 sync ./hugo/public s3://${{ inputs.s3_bucket_name }} \
            --acl public-read \
            --cache-control max-age=31536000,public \
            --only-show-errors
          if [ -d ./hugo/data ]; then
            aws s3 sync ./hugo/data s3://${{ inputs.s3_bucket_name }}/data \
              --acl public-read \
              --cache-control max-age=31536000,public \
              --only-show-errors
            aws s3 sync ./hugo/data s3://${{ inputs.s3_bucket_name }}/data \
              --acl public-read \
              --cache-control max-age=31536000,public \
              --exclude '*' --include '*.json' \
              --content-type application/json \
              --only-show-errors
            aws s3 sync ./hugo/data s3://${{ inputs.s3_bucket_name }}/data \
              --acl public-read \
              --cache-control max-age=31536000,public \
              --exclude '*' --include '*.jsonc' \
              --content-type application/jsonc \
              --only-show-errors
          fi

      - name: Cloudfront Invalidate
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ inputs.cloudfront_distribution_id }} \
            --paths "/*"

      - name: Cleanup
        uses: rtCamp/action-cleanup@master
